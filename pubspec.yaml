name: drsite
description: Dental & Dermatology Clinic Landing Page
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^6.2.1
  go_router: ^14.2.7
  url_launcher: ^6.2.5

  # ── Firebase ──────────────────────────────────────────────────
  firebase_core: ^3.6.0
  cloud_firestore: ^5.4.0
  firebase_auth: ^5.3.0

  # ── Email Notifications ───────────────────────────────────────
  http: ^1.2.2

  # ── Date Formatting (admin dashboard mein use hota hai) ───────
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/